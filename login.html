<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <!-- SECURITY: Prevent caching of sensitive data -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <!-- SECURITY: Security headers -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://supabase.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; connect-src 'self' https:;" />
  
  <title>Prompt Generator Pro — Log Masuk</title>
  <meta name="description" content="Log masuk atau daftar untuk menggunakan Business Prompt Generator Pro"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="styles/base.css"/>
  <link rel="stylesheet" href="css/login-clean.css"/>
  <link rel="stylesheet" href="css/fontello.css"/>
</head>
<body>
<main class="login-page" aria-label="Login">
  <section class="login-card" aria-labelledby="loginTitle">
    <div class="brand-wrap">
      <div class="brand-mark" aria-hidden="true">PG</div>
      <div class="brand-name">Prompt Generator Pro</div>
      <select id="langSwitcher" class="lang-switch" aria-label="Language" style="margin-left:auto"></select>
    </div>

    <h1 id="loginTitle" class="login-title" data-i18n="login.title">Sign in to your account</h1>
    <p class="login-subtitle" data-i18n="login.subtitle">Welcome back. Please enter your details to continue.</p>

    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail" data-i18n="login.email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon icon-mail" aria-hidden="true"></span>
          <input type="email" id="loginEmail" class="form-control" data-i18n-placeholder="login.email" placeholder="you@company.com" autocomplete="email" required/>
        </div>
        <p class="form-err" id="loginEmailErr" aria-live="polite"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword" data-i18n="login.password">Password</label>
        <div class="input-wrap pw-wrap">
          <span class="input-icon icon-lock" aria-hidden="true"></span>
          <input type="password" id="loginPassword" class="form-control" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Enter your password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)" aria-label="Show or hide password">Show</button>
        </div>
        <p class="form-err" id="loginPasswordErr" aria-live="polite"></p>
      </div>

      <div class="check-row">
        <label class="check-label"><input type="checkbox" id="rememberMe"/> <span data-i18n="login.remember">Remember me</span></label>
        <a href="#" class="forgot-link" data-i18n="login.forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn" disabled>
        <span class="btn-icon icon-login" aria-hidden="true"></span>
        <span class="btn-text" data-i18n="login.signin">Sign in</span>
      </button>

      <div class="divider">or</div>

      <button type="button" class="btn btn-secondary" id="googleLoginBtn" onclick="loginWithGoogle()">
        <span class="btn-icon icon-google" aria-hidden="true"></span>
        <span data-i18n="login.continueGoogle">Continue with Google</span>
      </button>

      <p class="auth-row"><span data-i18n="login.noAccount">Don't have an account?</span> <a href="register.html" data-i18n="login.createOne">Create one</a></p>
    </form>

    <p class="card-footer" data-i18n="login.secureNote">Protected access for authorized users only.</p>
  </section>
</main>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/rate-limiting.js"></script>
<script src="js/auth.js"></script>
<script src="js/i18n.js"></script>
<script>
  initI18n('langSwitcher');

  // Redirect jika dah login
  (function() {
    const s = JSON.parse(localStorage.getItem('pgp_cached_session') || 'null');
    if (s && s.userId) window.location.href = 'dashboard.html';
  })();

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const isText = el.type === 'text';
    el.type = isText ? 'password' : 'text';
    btn.textContent = isText ? 'Show' : 'Hide';
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById(id.replace('Err','')).classList.add('err');
  }

  function clearErr(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('show');
    document.getElementById(id.replace('Err','')).classList.remove('err');
  }

  function showToast(msg, type='info') {
    const c = document.getElementById('toastContainer');
    const iconClasses = {success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    const icon = document.createElement('span');
    icon.className = 'toast-icon';
    const iconEl = document.createElement('i');
    iconEl.className = `fa-solid ${iconClasses[type] || 'fa-circle-info'}`;
    icon.appendChild(iconEl);
    const text = document.createElement('span');
    text.className = 'toast-text';
    text.textContent = msg;
    t.appendChild(icon);
    t.appendChild(text);
    c.appendChild(t);
    setTimeout(()=>{ t.classList.add('toast-exit'); setTimeout(()=>t.remove(),350); }, 3500);
  }

  function updateLoginButtonState() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    document.getElementById('loginBtn').disabled = !(email && pass);
  }

  document.getElementById('loginEmail').addEventListener('input', updateLoginButtonState);
  document.getElementById('loginPassword').addEventListener('input', updateLoginButtonState);
  updateLoginButtonState();

  async function handleLogin(e) {
    e.preventDefault();
    ['loginEmail','loginPassword'].forEach(id=>clearErr(id+'Err'));
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;

    let ok = true;
    if (!email) { showErr('loginEmailErr', i18nText('login.err.emailRequired','Email is required')); ok=false; }
    if (!pass)  { showErr('loginPasswordErr', i18nText('login.err.passwordRequired','Password is required')); ok=false; }
    if (!ok) return;

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.classList.add('is-loading');
    btn.innerHTML = '<span class="spinner"></span><span class="btn-text">Signing in...</span>';

    const res = await loginUser(email, pass);
    btn.disabled = false;
    btn.classList.remove('is-loading');
    btn.innerHTML = '<span class="btn-icon icon-login" aria-hidden="true"></span><span class="btn-text">Sign in</span>';
    if (res.success) {
      await cacheSession();
      showToast(i18nText('login.toast.welcome','Welcome back!'), 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } else {
      showToast(res.message, 'error');
      showErr('loginPasswordErr', res.message);
      updateLoginButtonState();
    }
  }
</script>
</body>
</html>
